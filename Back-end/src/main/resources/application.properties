# ==========================
# SERVER
# ==========================
server.port=8080
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# ==========================
# DATABASE
# ==========================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=autowash_pro;encrypt=false;trustServerCertificate=true
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ==========================
# JPA
# ==========================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==========================
# SECURITY / PUBLIC API
# ==========================
autowash.cors.allowed-origins=${AUTOWASH_CORS_ALLOWED_ORIGINS:http://localhost:5173}
autowash.rate-limit.max-entries-per-scope=${RATE_LIMIT_MAX_ENTRIES_PER_SCOPE:10000}
autowash.verification-proof.cleanup-batch-size=${PROOF_CLEANUP_BATCH_SIZE:1000}
autowash.verification-proof.cleanup-initial-delay-ms=${PROOF_CLEANUP_INITIAL_DELAY_MS:60000}
autowash.verification-proof.cleanup-delay-ms=${PROOF_CLEANUP_DELAY_MS:600000}
autowash.booking.hold-cleanup-initial-delay-ms=${HOLD_CLEANUP_INITIAL_DELAY_MS:60000}
autowash.booking.hold-cleanup-delay-ms=${HOLD_CLEANUP_DELAY_MS:60000}

# Disabled by default. When explicitly enabled, every account field is required.
autowash.bootstrap.system-accounts.enabled=${SYSTEM_ACCOUNT_SEED_ENABLED:false}
autowash.bootstrap.system-accounts.staff.full-name=${SYSTEM_STAFF_FULL_NAME:}
autowash.bootstrap.system-accounts.staff.phone=${SYSTEM_STAFF_PHONE:}
autowash.bootstrap.system-accounts.staff.email=${SYSTEM_STAFF_EMAIL:}
autowash.bootstrap.system-accounts.staff.password=${SYSTEM_STAFF_PASSWORD:}
autowash.bootstrap.system-accounts.admin.full-name=${SYSTEM_ADMIN_FULL_NAME:}
autowash.bootstrap.system-accounts.admin.phone=${SYSTEM_ADMIN_PHONE:}
autowash.bootstrap.system-accounts.admin.email=${SYSTEM_ADMIN_EMAIL:}
autowash.bootstrap.system-accounts.admin.password=${SYSTEM_ADMIN_PASSWORD:}

# ==========================
# JWT
# ==========================
autowash.jwt.secret=${JWT_SECRET}
autowash.jwt.expiration-hours=24

# ==========================
# FIREBASE CONFIGURATION
# ==========================
firebase.config.path=classpath:firebase-service-account.json
autowash.payment.bank-code=VCB
autowash.payment.account-number=1234567890
autowash.payment.account-name=VINAWASH CO. LTD

# ==========================
# PAYOS (real payment gateway — see docs/superpowers/specs/2026-07-22-payos-real-payment-integration-design.md)
# ==========================
autowash.payos.client-id=${PAYOS_CLIENT_ID}
autowash.payos.api-key=${PAYOS_API_KEY}
autowash.payos.checksum-key=${PAYOS_CHECKSUM_KEY}
autowash.payos.base-url=${PAYOS_BASE_URL:https://api-merchant.payos.vn}
autowash.payos.return-url=${PAYOS_RETURN_URL:http://localhost:5173/app/booking/return}
autowash.payos.cancel-url=${PAYOS_CANCEL_URL:http://localhost:5173/app/booking/cancel}
autowash.payos.connect-timeout-ms=${PAYOS_CONNECT_TIMEOUT_MS:5000}
autowash.payos.read-timeout-ms=${PAYOS_READ_TIMEOUT_MS:10000}
