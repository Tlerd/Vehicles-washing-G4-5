services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-CU14-ubuntu-22.04
    container_name: autowash-sqlserver
    ports:
      - "127.0.0.1:1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=123456
      - MSSQL_PID=Developer
    volumes:
      - mssql-data:/var/opt/mssql
    restart: always

  frontend:
    build:
      context: ./Front-end
      dockerfile: Dockerfile
    container_name: autowash-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./Front-end:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

volumes:
  mssql-data:
    driver: local
